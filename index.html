<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a6b4a">
<title>측정소 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#1a6b4a;--green-dark:#155a3e;--green-light:#e8f5ef;
  --text:#111;--text2:#555;--text3:#888;
  --border:#e0e0e0;--bg:#f5f6f8;--white:#fff;
  --radius:12px;--shadow:0 2px 8px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}

/* PIN */
#pin-view{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;text-align:center;background:var(--green)}
.pin-logo{font-size:52px;margin-bottom:12px}
.pin-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:6px}
.pin-subtitle{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:36px}
.pin-dots{display:flex;gap:16px;justify-content:center;margin-bottom:32px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.5);background:transparent;transition:background .15s}
.pin-dot.filled{background:#fff;border-color:#fff}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.pin-key padding:18px 0;background:rgba(255,255,255,.12);border:none;border-radius:14px;color:#fff;font-size:22px;font-weight:600;cursor:pointer;transition:background .1s}
.pin-key:active{background:rgba(255,255,255,.28)}
.pin-error{font-size:13px;color:#ffcccc;margin-top:16px;min-height:20px}
.pin-hint{font-size:12px;color:rgba(255,255,255,.5);margin-top:10px}

/* TOPBAR */
.topbar{background:var(--green);color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar-row{display:flex;align-items:center;gap:8px}
.topbar h1{font-size:17px;font-weight:600;flex:1}
.back-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;padding:0 6px 0 0}
.search-wrap{margin-top:10px;position:relative}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;border-radius:8px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:15px;outline:none}
.search-wrap input::placeholder{color:rgba(255,255,255,.6)}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.7;font-size:16px;pointer-events:none}

/* SYNC */
.sync-bar{background:var(--white);padding:7px 16px;border-bottom:1px solid var(--border);font-size:12px;display:flex;align-items:center;gap:6px}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-dot.ok{background:#2d8f63}
.sync-dot.loading{background:#f0a500;animation:pulse 1s ease-in-out infinite}
.sync-dot.error{background:#c5221f}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-text{color:var(--text3);flex:1}
.sync-refresh{background:none;border:none;color:var(--green);font-size:12px;font-weight:600;cursor:pointer;padding:0}

/* CHIPS */
.cat-chips{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;background:#f0faf5;border-bottom:1px solid var(--border)}
.cat-chips::-webkit-scrollbar{display:none}
.cat-chip{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid #b2dfc8;background:#fff;color:var(--green);white-space:nowrap;cursor:pointer}
.cat-chip.active{background:var(--green);color:#fff;border-color:var(--green)}
.chips{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;background:var(--white);border-bottom:1px solid var(--border)}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--white);color:var(--text2);white-space:nowrap;cursor:pointer}
.chip.active{background:var(--green);color:#fff;border-color:var(--green)}

/* STATS */
.stats-bar{background:var(--white);padding:7px 16px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text3);display:flex;gap:10px;align-items:center}
.stats-bar b{color:var(--green);font-weight:600}
.stats-div{color:var(--border)}

/* LIST */
.list{padding:8px 0}
.station-item{background:var(--white);margin:0 12px 8px;border-radius:var(--radius);padding:14px 16px;cursor:pointer;box-shadow:var(--shadow);border:1px solid var(--border);transition:transform .1s}
.station-item:active{transform:scale(.98)}
.si-top{display:flex;align-items:flex-start;gap:8px}
.si-cat{font-size:10px;font-weight:600;color:#fff;background:var(--green);padding:2px 7px;border-radius:10px;white-space:nowrap;margin-top:3px;flex-shrink:0}
.si-region{font-size:11px;font-weight:600;color:var(--green);background:var(--green-light);padding:2px 8px;border-radius:10px;white-space:nowrap;margin-top:3px;flex-shrink:0}
.si-name{font-size:15px;font-weight:600;flex:1}
.dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.dot.filled{background:#2d8f63}
.dot.empty{background:#ddd}
.si-addr{font-size:12px;color:var(--text3);margin-top:4px;line-height:1.4}
.si-tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.tag-elev{background:#e8f0fe;color:#1967d2}
.tag-roof{background:#fce8e6;color:#c5221f}
.tag-note{background:#fef7e0;color:#b06000}
.tag-update{background:#f1f3f4;color:#555}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty p{margin-top:8px;font-size:14px}

/* DETAIL */
#detail-view{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto}
.detail-topbar{background:var(--green);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px}
.detail-topbar h2{font-size:17px;font-weight:600;flex:1}
.detail-body{padding:16px}
.card{background:var(--white);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border)}
.card-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;display:flex;justify-content:space-between;align-items:center}
.card-header .year-title{font-size:14px;color:var(--green);font-weight:700}
.card-header .update-date{font-size:11px;color:var(--text3);font-weight:400;margin-left:auto}
.info-row{display:flex;padding:11px 16px;border-bottom:1px solid var(--border);gap:8px}
.info-row:last-child{border-bottom:none}
.info-label{font-size:12px;color:var(--text3);width:60px;flex-shrink:0;padding-top:2px}
.info-val{font-size:14px;flex:1;line-height:1.5}
.pw-row{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border)}
.pw-row:last-child{border-bottom:none}
.pw-label{font-size:12px;color:var(--text3);width:64px;flex-shrink:0}
.pw-val{font-size:16px;font-weight:600;flex:1;letter-spacing:.05em;font-family:monospace}
.pw-toggle{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 2px}
.pw-empty{font-size:14px;color:#bbb;flex:1}
.form-section{background:var(--white);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border)}
.form-row{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.form-row:last-child{border-bottom:none}
.form-label{font-size:13px;color:var(--text2);width:72px;flex-shrink:0}
.form-row input[type=text]{flex:1;border:none;font-size:15px;background:none;outline:none;color:var(--text);font-family:inherit}
.form-row textarea{flex:1;border:none;font-size:14px;background:none;outline:none;color:var(--text);font-family:inherit;resize:none;line-height:1.5;min-height:60px}
.toggle-wrap{display:flex;gap:6px;flex:1}
.toggle-opt{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid var(--border);background:var(--white);color:var(--text2);cursor:pointer}
.toggle-opt.active{background:var(--green);color:#fff;border-color:var(--green)}
.save-btn{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;margin-bottom:12px}
.save-btn:active{background:var(--green-dark)}
.save-btn:disabled{background:#aaa;cursor:not-allowed}
.del-btn{width:100%;padding:12px;background:none;color:#c5221f;border:1.5px solid #fad2cf;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;margin-bottom:20px}
.add-block-btn{width:100%;padding:14px;background:#fff;color:var(--green);border:1.5px dashed var(--green);border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:20px;text-align:center}
</style>
</head>

<div id="pin-view">

    <div class="pin-dot" id="pd0"></div>

<div id="list-view" style="display:none">

      <h1>&#127807; 측정소 관리</h1>
    </div>

      <input type="search" id="search-input" placeholder="측정소명, 지역, 주소 검색..." oninput="renderList()">

  </div>
  <div class="sync-bar" id="sync-bar">
    <div class="sync-dot loading" id="sync-dot"></div>
    <span class="sync-text" id="sync-text">데이터 불러오는 중...</span>
    <button class="sync-refresh" onclick="loadFromSheets()">&#8635; 새로고침</button>
  </div>
  <div class="cat-chips" id="cat-chips"></div>
  <div class="chips" id="region-chips"></div>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="list" id="station-list"></div>
</div>

<div id="detail-view">
  <div class="detail-topbar">
    <button class="back-btn" onclick="closeDetail()">&#8592;</button>
    <h2 id="detail-title"></h2>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

/* ── 화면 전환 ── */
function showView(id) {
  var ids = ['pin-view','list-view','detail-view'];
  for (var i = 0; i < ids.length; i++) {
    var el = document.getElementById(ids[i]);
    if (el) el.style.display = (ids[i] === id) ? (id === 'pin-view' ? 'flex' : 'block') : 'none';
  }
}

/* ── PIN 백엔드 연동 ── */
var pinBuffer = '';
function showPin() { showView('pin-view'); pinBuffer = ''; updatePinDots(); }
function pinPress(num) {
  if (!num || pinBuffer.length >= 4) return;
  pinBuffer += num;
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(checkPinBackend, 150);
}
function pinDel() {
  pinBuffer = pinBuffer.slice(0, -1);
  document.getElementById('pin-error').textContent = '';
  updatePinDots();
}
function updatePinDots() {
  for (var i = 0; i < 4; i++) {
    document.getElementById('pd' + i).className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
  }
}
function checkPinBackend() {
  document.getElementById('pin-error').textContent = '인증 확인 중...';
  fetch(scriptUrl + '?action=checkPin&pin=' + pinBuffer)
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.ok && res.authenticated) {
        sessionStorage.setItem('pinOk', '1');
        startApp();
      } else {
        shakePinDots();
      }
    })
    .catch(function() {
      if (pinBuffer === '6305') { sessionStorage.setItem('pinOk', '1'); startApp(); } 
      else { shakePinDots(); }
    });
}
function shakePinDots() {
  document.getElementById('pin-error').textContent = '잘못된 PIN입니다. 다시 시도하세요.';
  pinBuffer = '';
  updatePinDots();
  var d = document.querySelector('.pin-dots');
  var moves = [10, -10, 8, -8, 0];
  var idx = 0;
  var t = setInterval(function() {
    d.style.transform = 'translateX(' + moves[idx] + 'px)';
    idx++;
    if (idx >= moves.length) { clearInterval(t); d.style.transform = ''; }
  }, 60);
}

/* ── 초기화 ── */
function init() {
  if (!sessionStorage.getItem('pinOk')) { showPin(); return; }
  startApp();
}
function startApp() {
  showView('list-view');
  buildCategoryChips();
  buildRegionChips();
  loadFromSheets();
}

/* ── Sheets API ── */
function setSyncStatus(state, msg) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-text').textContent = msg;
}
function loadFromSheets() {
  if (!scriptUrl) return;
  setSyncStatus('loading', '동기화 중...');
  fetch(scriptUrl + '?action=getAll')
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.ok) {
        sheetsData = res.records || {};
        var n = Object.keys(sheetsData).length;
        var now = new Date();
        var hm = ('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
        setSyncStatus('ok', n + '건 \u00B7 ' + hm + ' 동기화 완료');
        renderList();
      } else { setSyncStatus('error', '불러오기 실패: ' + (res.error || '')); }
    })
    .catch(function() { setSyncStatus('error', '연결 오류'); });
}

  var body = 'action=save&data=' + encodeURIComponent(JSON.stringify(
    { stationId: sid, year: year, doorPw: data.doorPw, roofPw: data.roofPw,
      elevator: data.elevator, note: data.note, updated: data.updated }
  ));
  return fetch(scriptUrl, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: body })
    .then(function(r) { return r.json(); });
}
function apiDelete(sid, year) {
  return fetch(scriptUrl, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: 'action=delete&stationId=' + sid + '&year=' + year })
    .then(function(r) { return r.json(); });
}

/* ── 로컬 캐시 ── */
function getRecord(sid, year) { return sheetsData[sid + '_' + year] || null; }
function getRecordYears(sid) {
  var years = [];
  var prefix = sid + '_';
  for (var k in sheetsData) {
    if (k.indexOf(prefix) === 0) {
      var y = parseInt(k.slice(prefix.length));
      if (!isNaN(y)) years.push(y);
    }
  }
  return years.sort(function(a, b) { return b - a; });
}

/* ── 유틸: ISO 날짜 변환 함수 ── */
function formatDate(isoString) {
  if (!isoString) return '';
  try {
    var d = new Date(isoString);
    if (isNaN(d.getTime())) return '';
    return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2) + ' ' + ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
  } catch(e) { return ''; }
}

/* ── 대분류 칩 ── */
var CATEGORIES = ['전체', '도시대기', '도로변대기', '교외대기', '국가배경', '항만'];
function buildCategoryChips() {
  var el = document.getElementById('cat-chips');
  var h = '';
  for (var i = 0; i < CATEGORIES.length; i++) {
    var c = CATEGORIES[i];
    h += '<div class="cat-chip' + (c === currentCategory ? ' active' : '') +
         '" onclick="selectCategory(this,\'' + c + '\')">' + c + '</div>';
  }
  el.innerHTML = h;
}
function selectCategory(el, c) {
  currentCategory = c;
  currentRegion = '전체';
  var chips = document.querySelectorAll('.cat-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  buildRegionChips();
  renderList();
}

/* ── 지역 칩 ── */
function buildRegionChips() {
  var seen = {};
  var regions = ['전체'];
  for (var i = 0; i < STATIONS.length; i++) {
    var s = STATIONS[i];
    if (currentCategory !== '전체' && s.category !== currentCategory) continue;
    if (!seen[s.region]) { seen[s.region] = true; regions.push(s.region); }
  }
  regions.sort(function(a, b) { return a === '전체' ? -1 : b === '전체' ? 1 : a.localeCompare(b); });
  var el = document.getElementById('region-chips');
  var h = '';
  for (var j = 0; j < regions.length; j++) {
    var r = regions[j];
    h += '<div class="chip' + (r === currentRegion ? ' active' : '') +
         '" onclick="selectRegion(this,\'' + eA(r) + '\')">' + eH(r) + '</div>';
  }
  el.innerHTML = h;
}
function selectRegion(el, r) {
  currentRegion = r;
  var chips = document.querySelectorAll('.chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  renderList();
}

/* ── 목록 ── */
function renderList() {
  var q = document.getElementById('search-input').value.trim().toLowerCase();
  var filtered = [];
  for (var i = 0; i < STATIONS.length; i++) {
    var s = STATIONS[i];
    if (currentCategory !== '전체' && s.category !== currentCategory) continue;
    if (currentRegion !== '전체' && s.region !== currentRegion) continue;
    if (q && s.name.toLowerCase().indexOf(q) < 0 &&
        s.region.toLowerCase().indexOf(q) < 0 &&
        s.address.toLowerCase().indexOf(q) < 0) continue;
    filtered.push(s);
  }

  var totalAll = STATIONS.length;
  var filledAll = 0;
  for (var fa = 0; fa < STATIONS.length; fa++) {
    var ry = getRecordYears(STATIONS[fa].id);
    if (ry.length > 0) filledAll++;
  }
  var filledFiltered = 0;
  for (var ff = 0; ff < filtered.length; ff++) {
    var ryF = getRecordYears(filtered[ff].id);
    if (ryF.length > 0) filledFiltered++;
  }

  var sb = document.getElementById('stats-bar');
  sb.innerHTML = '<span>&#128202; 전체 데이터 보유 <b>' + filledAll + ' / ' + totalAll + '</b></span>' +
    '<span class="stats-div">|</span>' +
    '<span>현재 필터 <b>' + filledFiltered + ' / ' + filtered.length + '</b></span>';

  var el = document.getElementById('station-list');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div style="font-size:40px">&#128269;</div><p>검색 결과가 없습니다</p></div>';
    return;
  }
  var h = '';
  for (var m = 0; m < filtered.length; m++) {
    var s2 = filtered[m];
    var ryList = getRecordYears(s2.id);
    var hasData = ryList.length > 0;
    var tags = '';
    
    if (hasData) {
      var latestRec = getRecord(s2.id, ryList[0]); // 가장 최근 연도 기록 기준으로 태그 노출
      if (latestRec) {
        if (latestRec.elevator === 'yes') tags += '<span class="tag tag-elev">&#128701; 엘리베이터</span>';
        if (latestRec.roofPw) tags += '<span class="tag tag-roof">&#127970; 옥상비번</span>';
        if (latestRec.note) tags += '<span class="tag tag-note">&#128221; 메모</span>';
        if (latestRec.updated) tags += '<span class="tag tag-update">' + formatDate(latestRec.updated).split(' ')[0] + '</span>';
      }
    }
    h += '<div class="station-item" onclick="openDetail(' + s2.id + ')">' +
      '<div class="si-top">' +
      '<span class="si-cat">' + eH(s2.category) + '</span>' +
      '<span class="si-region">' + eH(s2.region) + '</span>' +
      '<span class="si-name">' + eH(s2.name) + '</span>' +
      '<div class="dot ' + (hasData ? 'filled' : 'empty') + '"></div>' +
      '</div>' +
      '<div class="si-addr">' + eH(s2.address) + '</div>' +
      (tags ? '<div class="si-tags">' + tags + '</div>' : '') +
      '</div>';
  }
  el.innerHTML = h;
}

/* ── 상세 ── */
function findStation(id) {
  for (var i = 0; i < STATIONS.length; i++) { if (STATIONS[i].id === id) return STATIONS[i]; }
  return null;
}
function openDetail(id) {
  currentStationId = id; pwVisible = {};
  var s = findStation(id);
  document.getElementById('detail-title').textContent = s.name;
  showView('detail-view');
  document.getElementById('detail-view').scrollTop = 0;
  renderDetail();
}
function closeDetail() { showView('list-view'); renderList(); }

/* ── 전체 기록 리스트 형태로 표시 ── */
function renderDetail() {
  var s = findStation(currentStationId);
  var ry = getRecordYears(currentStationId);
  var h = '';

  h += '<div class="card">' +
    '<div class="card-header"><span class="year-title">측정소 정보</span></div>' +
    '<div class="info-row"><span class="info-label">분류</span><span class="info-val">' + eH(s.category) + '</span></div>' +
    '<div class="info-row"><span class="info-label">지역</span><span class="info-val">' + eH(s.region) + '</span></div>' +
    '<div class="info-row"><span class="info-label">주소</span><span class="info-val">' + eH(s.address) + '</span></div>' +
    '<div class="info-row"><span class="info-label">운영기관</span><span class="info-val">' + eH(s.operator) + '</span></div>' +
    '<div class="info-row"><span class="info-label">설치연도</span><span class="info-val">' + eH(s.year_installed || '-') + '</span></div>' +
    '</div>';

  h += '<button class="add-block-btn" onclick="openEdit(' + currentYear + ')">&#10133; 새로운 연도 기록 추가하기</button>';

  if (ry.length > 0) {
    for (var i = 0; i < ry.length; i++) {
      var y2 = ry[i];
      var rec = getRecord(currentStationId, y2);
      if (!rec) continue;

      var ds = pwVisible[y2 + '_door'] || false;
      var rs = pwVisible[y2 + '_roof'] || false;
      var dateStr = rec.updated ? formatDate(rec.updated) : '날짜 없음';

      h += '<div class="card">' +
        '<div class="card-header">' +
        '<span class="year-title">' + y2 + '년 기록</span>' +
        '<span class="update-date">&#128336; 입력일: ' + dateStr + '</span>' +
        '</div>';

      h += '<div class="pw-row"><span class="pw-label">&#128273; 도어락</span>';
      if (rec.doorPw) {
        h += '<span class="pw-val">' + (ds ? eH(rec.doorPw) : '&bull;&bull;&bull;&bull;&bull;&bull;') + '</span>' +
             '<button class="pw-toggle" onclick="togglePw(\'' + y2 + '_door\')">' + (ds ? '&#128584;' : '&#128065;') + '</button>';
      } else { h += '<span class="pw-empty">미입력</span>'; }
      h += '</div>';

      h += '<div class="pw-row"><span class="pw-label">&#127970; 옥상</span>';
      if (rec.roofPw) {
        h += '<span class="pw-val">' + (rs ? eH(rec.roofPw) : '&bull;&bull;&bull;&bull;&bull;&bull;') + '</span>' +
             '<button class="pw-toggle" onclick="togglePw(\'' + y2 + '_roof\')">' + (rs ? '&#128584;' : '&#128065;') + '</button>';
      } else { h += '<span class="pw-empty">없음/미입력</span>'; }
      h += '</div>';

      h += '<div class="pw-row"><span class="pw-label">&#128701; 엘리베이터</span>' +
           '<span class="info-val">' + (rec.elevator==='yes' ? '&#9989; 있음' : rec.elevator==='no' ? '&#10060; 없음' : '미입력') + '</span></div>';
      h += '<div class="pw-row"><span class="pw-label">&#128221; 메모</span>' +
           '<span class="info-val" style="font-size:13px;line-height:1.5;color:' + (rec.note?'var(--text)':'#bbb') + '">' + eH(rec.note || '없음') + '</span></div>';
      
      h += '<div style="padding: 10px 16px; display:flex; gap:8px; border-top:1px solid var(--border); background:#fafafa">' +
           '<button class="save-btn" style="margin-bottom:0; padding:8px; font-size:13px" onclick="openEdit(' + y2 + ')">&#9999; 수정</button>' +
           '<button class="del-btn" style="margin-bottom:0; padding:8px; font-size:13px; background:#fff" onclick="confirmDelete(' + y2 + ')">&#128465; 삭제</button>' +
           '</div>';

      h += '</div>';
    }
  } else {
    h += '<div style="padding:40px 16px; text-align:center; color:var(--text3); background:#fff; border-radius:var(--radius); border:1px solid var(--border)">' +
         '<div style="font-size:32px">&#128221;</div>' +
         '<p style="margin-top:8px; font-size:14px">저장된 연도별 기록이 없습니다.</p>' +
         '</div>';
  }

  document.getElementById('detail-body').innerHTML = h;
}

function togglePw(key) { pwVisible[key] = !pwVisible[key]; renderDetail(); }

function confirmDelete(year) {
  if (!confirm(year + '년 기록을 삭제할까요?')) return;
  setSyncStatus('loading', '삭제 중...');
  apiDelete(currentStationId, year).then(function(res) {
    if (res.ok) {
      delete sheetsData[currentStationId + '_' + year];
      setSyncStatus('ok', '삭제 완료');
      renderDetail();
    } else { setSyncStatus('error', '삭제 실패'); alert('삭제 중 오류가 발생했습니다.'); }
  }).catch(function() { setSyncStatus('error', '연결 오류'); alert('네트워크 오류가 발생했습니다.'); });
}

/* ── 편집 ── */
function openEdit(year) {
  var s = findStation(currentStationId);
  var rec = getRecord(currentStationId, year) || {};
  var h = '<div class="card" style="padding:12px 16px;margin-bottom:12px">' +
    '<div style="font-size:13px;color:var(--text3)">' + eH(s.category) + ' &middot; ' + eH(s.region) + ' &middot; ' + eH(s.address) + '</div></div>';
  h += '<div class="form-section">' +
    '<div class="form-row"><span class="form-label">&#128197; 연도</span>' +
    '<input type="number" id="f-year" style="border:none; font-size:15px; font-weight:600; color:var(--green); outline:none" value="' + year + '" min="1970" max="2099"></div>' +
    '<div class="form-row"><span class="form-label">&#128273; 도어락</span><input type="text" id="f-door" placeholder="비밀번호 입력" value="' + eA(rec.doorPw||'') + '" inputmode="numeric"></div>' +
    '<div class="form-row"><span class="form-label">&#127970; 옥상</span><input type="text" id="f-roof" placeholder="없으면 비워두기" value="' + eA(rec.roofPw||'') + '" inputmode="numeric"></div>' +
    '<div class="form-row"><span class="form-label">&#128701; 엘리베이터</span><div class="toggle-wrap">' +
    '<button class="toggle-opt' + (rec.elevator==='yes'?' active':'') + '" id="elev-yes" onclick="toggleElev(\'yes\')">있음</button>' +
    '<button class="toggle-opt' + (rec.elevator==='no'?' active':'') + '" id="elev-no" onclick="toggleElev(\'no\')">없음</button>' +
    '</div></div>' +
    '<div class="form-row"><span class="form-label">&#128221; 특이사항</span><textarea id="f-note" placeholder="경비실 연락, 진입 방법 등...">' + eH(rec.note||'') + '</textarea></div>' +
    '</div>';
  h += '<button class="save-btn" id="save-btn" onclick="saveRecord(' + year + ')">&#128190; 저장하기</button>';
  h += '<button class="del-btn" onclick="renderDetail()">취소</button>';
  document.getElementById('detail-body').innerHTML = h;
}
function toggleElev(val) {
  document.getElementById('elev-yes').classList.toggle('active', val === 'yes');
  document.getElementById('elev-no').classList.toggle('active', val === 'no');
}
function saveRecord(oldYear) {
  var year = parseInt(document.getElementById('f-year').value.trim()) || oldYear;
  var doorPw = document.getElementById('f-door').value.trim();
  var roofPw = document.getElementById('f-roof').value.trim();
  var note = document.getElementById('f-note').value.trim();
  var ey = document.getElementById('elev-yes');
  var en = document.getElementById('elev-no');
  var elevator = ey && ey.classList.contains('active') ? 'yes' : (en && en.classList.contains('active') ? 'no' : '');
  var btn = document.getElementById('save-btn');
  
  btn.disabled = true; btn.textContent = '저장 중...';
  var data = { doorPw:doorPw, roofPw:roofPw, elevator:elevator, note:note, updated:new Date().toISOString() };
  
  apiSave(currentStationId, year, data).then(function(res) {
    if (res.ok) {
      sheetsData[currentStationId + '_' + year] = Object.assign({ stationId:currentStationId, year:year }, data);
      if(oldYear !== year) { delete sheetsData[currentStationId + '_' + oldYear]; }
      pwVisible = {};
      setSyncStatus('ok', '저장 완료 \u2713');
      renderDetail();
      document.getElementById('detail-view').scrollTop = 0;
    } else {
      btn.disabled = false; btn.textContent = '&#128190; 저장하기';
      alert('저장 실패: ' + (res.error || '오류가 발생했습니다.'));
    }
  }).catch(function() {
    btn.disabled = false; btn.textContent = '&#128190; 저장하기';
    setSyncStatus('error', '연결 오류');
    alert('네트워크 오류가 발생했습니다.');
  });
}

/* ── 유틸 ── */
function eH(s) {
  if (!s) return '';
  return String(s).split('&').join('&amp;').split('<').join('&lt;').split('>').join('&gt;').split('"').join('&quot;');
}
function eA(s) {
  if (!s) return '';
  return String(s).split('&').join('&amp;').split('"').join('&quot;').split("'").join('&#39;');
}

init();
</script>
</body>
</html>
